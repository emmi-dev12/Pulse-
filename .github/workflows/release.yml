name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        default: "v0.0.0-dev"

permissions:
  contents: write

jobs:
  build:
    name: Build Universal DMG
    runs-on: macos-14          # Apple Silicon; can cross-compile x86_64

    env:
      VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: "16"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      # Single archive pass that produces a universal (arm64 + x86_64) binary
      - name: Build universal archive
        run: |
          xcodebuild archive \
            -project Pulse.xcodeproj \
            -scheme Pulse \
            -configuration Release \
            -archivePath "$RUNNER_TEMP/Pulse.xcarchive" \
            -destination "generic/platform=macOS" \
            ARCHS="arm64 x86_64" \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Extract .app from archive
        run: |
          cp -R \
            "$RUNNER_TEMP/Pulse.xcarchive/Products/Applications/Pulse.app" \
            "$RUNNER_TEMP/Pulse.app"
          echo "Architectures:"
          lipo -info "$RUNNER_TEMP/Pulse.app/Contents/MacOS/Pulse"

      # Ad-hoc sign so macOS will launch the app (right-click → Open on first run)
      - name: Ad-hoc sign
        run: |
          codesign --force --deep --sign - "$RUNNER_TEMP/Pulse.app"

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          create-dmg \
            --volname "Pulse" \
            --window-pos 200 120 \
            --window-size 560 340 \
            --icon-size 128 \
            --icon "Pulse.app" 150 170 \
            --hide-extension "Pulse.app" \
            --app-drop-link 410 170 \
            --no-internet-enable \
            "$RUNNER_TEMP/Pulse-${{ env.VERSION }}.dmg" \
            "$RUNNER_TEMP/Pulse.app"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: "Pulse ${{ env.VERSION }}"
          draft: false
          prerelease: ${{ contains(env.VERSION, '-beta') || contains(env.VERSION, '-rc') }}
          generate_release_notes: true
          files: ${{ runner.temp }}/Pulse-${{ env.VERSION }}.dmg
          body: |
            ## Install

            1. Download **Pulse-${{ env.VERSION }}.dmg**
            2. Open the DMG and drag **Pulse** to Applications
            3. **First launch only:** right-click Pulse → Open (bypasses Gatekeeper for ad-hoc signed builds)
            4. Complete the onboarding wizard — enter your Convex URL, Composio key, and grant permissions

            ## Requirements
            - macOS 14 Sonoma or later
            - Intel or Apple Silicon Mac (universal binary — works on your 2018 MacBook Pro)
